services:
  - type: web
    name: auth-component-detector-api
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://yashpatil582.github.io
      - key: PYTHON_VERSION
        value: 3.12.0
